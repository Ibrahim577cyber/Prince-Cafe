<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salad & Bread - Prince Café</title>
<style>
body{margin:0;padding:0;font-family:sans-serif;background:#fff;}
.menu-header {position:relative;width:100%;height:250px;overflow:hidden;}
.menu-header img {width:100%;height:100%;object-fit:cover;}
.header-overlay {position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;}
.header-overlay h1 {color:#fff;font-size:3rem;text-shadow:1px 1px 5px rgba(0,0,0,0.7);padding:10px 20px;border-radius:10px;background:rgba(255,255,255,0.1);}
.back-btn{margin:15px;display:inline-block;padding:8px 12px;background:#d2691e;color:white;border-radius:5px;text-decoration:none;font-weight:600;cursor:pointer;}
.menu-section{padding:20px;}
.item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #ddd;}
.item-name{flex:1;min-width:150px;font-weight:600;}
.qty-btns{display:flex;align-items:center;gap:5px;width:100px;justify-content:flex-end;}
.qty-btns button{padding:4px 8px;cursor:pointer;font-weight:bold;background:#d2691e;color:white;border:none;border-radius:4px;}
.qty-btns span{min-width:20px;text-align:center;display:inline-block;}
.cart-btn{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:10px 15px;border-radius:50px;cursor:pointer;z-index:1000;}
.cart-count{background:white;color:#25D366;padding:2px 6px;border-radius:50%;margin-left:5px;font-weight:700;}
.cart-modal{position:fixed;bottom:70px;right:20px;width:350px;background:white;border:1px solid #d2691e;border-radius:8px;max-height:500px;overflow-y:auto;display:none;z-index:1000;}
.cart-item{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #ddd;align-items:center;}
.cart-total{padding:8px;font-weight:600;text-align:right;}
.send-whatsapp{width:100%;background:#25D366;color:white;border:none;padding:8px;border-radius:5px;cursor:pointer;font-weight:600;margin-top:5px;}
</style>
</head>
<body>

<header class="menu-header">
  <img src="https://image2url.com/r2/default/images/1773668894224-7f5efb63-17aa-4294-914d-f9153283ae59.jpeg" alt="Salad & Bread">
  <div class="header-overlay">
    <h1>Salad & Bread</h1>
  </div>
</header>

<button class="back-btn" onclick="window.history.back()">&#8592; Back</button>

<div class="menu-section" id="menu-section"></div>

<div class="cart-btn">Cart <span class="cart-count">0</span></div>
<div class="cart-modal">
  <div class="cart-items"></div>
  <div class="cart-total">Total: 0/-</div>
  <button class="send-whatsapp">Send Order via WhatsApp</button>
</div>

<script>
const menuItems=[
{name:'Fresh Salad',type:'',price:120},
{name:'Kachumbar Salad',type:'',price:120},
{name:'Russian Salad',type:'Full',price:600},
{name:'Russian Salad',type:'Party',price:1200},
{name:'Sada Roti',type:'',price:50},
{name:'Naan',type:'',price:50},
{name:'Rogni Naan',type:'',price:60}
];

let cart = JSON.parse(localStorage.getItem('princeCafeCart')) || [];

const menuSection=document.getElementById('menu-section');
menuItems.forEach((item,index)=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`
    <span class="item-name">${item.name} ${item.type? '('+item.type+')':''} - ${item.price}/-</span>
    <div class="qty-btns">
        <button class="minus-btn">-</button>
        <span id="qty-${index}">0</span>
        <button class="plus-btn">+</button>
    </div>`;
    menuSection.appendChild(div);

    const plusBtn = div.querySelector('.plus-btn');
    const minusBtn = div.querySelector('.minus-btn');

    plusBtn.addEventListener('click',()=>{
        addToCart(item.name,item.type,item.price);
        refreshQtyDisplay();
    });

    minusBtn.addEventListener('click',()=>{
        decreaseCart(item.name,item.type);
        refreshQtyDisplay();
    });
});

function addToCart(name,type,price){
    const existing = cart.find(i=>i.name===name && i.type===type);
    if(existing) existing.qty++;
    else cart.push({name,type,price,qty:1});
    refreshCartUI();
}

function decreaseCart(name,type){
    const existing = cart.find(i=>i.name===name && i.type===type);
    if(existing){
        existing.qty--;
        if(existing.qty<=0) cart=cart.filter(i=>i!==existing);
    }
    refreshCartUI();
}

function refreshQtyDisplay(){
    menuItems.forEach((item,index)=>{
        const existing=cart.find(i=>i.name===item.name && i.type===item.type);
        document.getElementById('qty-'+index).innerText = existing? existing.qty:0;
    });
}

function refreshCartUI(){
    const cartItemsDiv=document.querySelector('.cart-items');
    cartItemsDiv.innerHTML='';
    let total=0;
    cart.forEach((i,index)=>{
        total+=i.price*i.qty;
        cartItemsDiv.innerHTML+=`
        <div class="cart-item">
            <span>${i.name} ${i.type? '('+i.type+')':''}</span>
            <div class="qty-btns">
                <button class="minus-cart" data-index="${index}">-</button>
                <span>${i.qty}</span>
                <button class="plus-cart" data-index="${index}">+</button>
            </div>
            <span>${i.price*i.qty}/-</span>
        </div>`;
    });
    document.querySelector('.cart-count').innerText=cart.reduce((s,i)=>s+i.qty,0);
    document.querySelector('.cart-total').innerText='Total: '+total+'/-';
    localStorage.setItem('princeCafeCart',JSON.stringify(cart));

    document.querySelectorAll('.plus-cart').forEach(btn=>{
        btn.addEventListener('click',()=>{
            const idx=parseInt(btn.getAttribute('data-index'));
            cart[idx].qty++;
            refreshCartUI();
        });
    });
    document.querySelectorAll('.minus-cart').forEach(btn=>{
        btn.addEventListener('click',()=>{
            const idx=parseInt(btn.getAttribute('data-index'));
            cart[idx].qty--;
            if(cart[idx].qty<=0) cart.splice(idx,1);
            refreshCartUI();
        });
    });
}

document.querySelector('.cart-btn').addEventListener('click',()=>{
    const m=document.querySelector('.cart-modal');
    m.style.display=m.style.display==='none'?'block':'none';
});

document.querySelector('.send-whatsapp').addEventListener('click',()=>{
    if(cart.length===0){alert('Cart empty'); return;}
    let msg="Order:%0A";
    let total=0;
    cart.forEach(i=>{
        msg+=`${i.name} ${i.type? '('+i.type+')':''} x${i.qty} = ${i.price*i.qty}/-%0A`;
        total+=i.price*i.qty;
    });
    msg+=`Total: ${total}/-`;
    window.open(`https://wa.me/923302522258?text=${msg}`,'_blank');
});

refreshCartUI();
refreshQtyDisplay();
</script>
</body>
</html>
